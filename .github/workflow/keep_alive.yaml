# 파일명: .github/workflows/keep_alive.yml
name: Keep Streamlit Alive

# 언제 이 작업을 실행할지 정의합니다.
# 출처: GitHub Actions 공식 문서 (Events that trigger workflows - schedule)
on:
  schedule:
    - cron: '0 */1 * * *' # 매 6시간마다 실행 (UTC 기준)
  workflow_dispatch: # (임의 보완) 사용자가 GitHub 웹페이지에서 버튼을 눌러 수동으로 즉시 실행해볼 수 있는 옵션

jobs:
  ping-site:
    runs-on: ubuntu-latest # GitHub가 제공하는 무료 리눅스 서버 사용

    steps:
      - name: 리포지토리 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 환경 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필요한 라이브러리 설치 (Selenium)
        run: |
          python -m pip install --upgrade pip
          pip install selenium

      - name: 자동 접속 스크립트 실행
        run: python keep_alive.py